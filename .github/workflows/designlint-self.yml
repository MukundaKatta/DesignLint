name: DesignLint (self-test)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  designlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install + build
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Run DesignLint on examples/dirty.html (never fail)
        run: |
          node dist/cli.js examples/dirty.html --format github --fail-on never
          node dist/cli.js examples/dirty.html --format sarif --output designlint.sarif --fail-on never

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: designlint.sarif

      - name: Run DesignLint on examples/clean.html (must pass)
        run: node dist/cli.js examples/clean.html --fail-on error
