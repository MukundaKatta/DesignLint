<!doctype html>
<html>
<head>
  <title>Style Block Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    .low-contrast { color: #ddd; background-color: #fff; }
    .tiny { font-size: 9px; }

  </style>
</head>
<body>
  <h1>Hello</h1>
  <p class="low-contrast">Should flag.</p>
  <span class="tiny">Too small.</span>
  <button class="small">X</button>
</body>
</html>
